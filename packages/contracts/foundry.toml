[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.30"
evm_version = "prague"
optimizer = true
optimizer_runs = 10_000
# ffi is required only by test/differential/Eip712Differential.t.sol, which
# shells out to a viem script to cross-check the EIP-712 digest. No other
# test or source path uses ffi.
ffi = true
fs_permissions = []

[fuzz]
runs = 512

[invariant]
runs = 64
depth = 64

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
